<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTEMIS II</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <pre class="ascii-art">


    _   ___ _____ ___ __  __ ___ ___   ___ ___
   /_\ | _ \_   _| __|  \/  |_ _/ __| |_ _|_ _|
  / _ \|   / | | | _|| |\/| || |\__ \  | | | |
 /_/ \_\_|_\ |_| |___|_|  |_|___|___/ |___|___|
        </pre>

        <div class="menu">
            <div class="settings-container">
                <div class="setting-group">
                    <label for="enemyCount">ENEMIES</label>
                    <input type="number" id="enemyCount" value="3" min="0" max="20" class="setting-input">
                </div>
                <div class="setting-group">
                    <label for="dropletCount">OXYGEN</label>
                    <input type="number" id="dropletCount" value="5" min="0" max="50" class="setting-input">
                </div>
                <div class="setting-group">
                    <label for="boxCount">BOXES</label>
                    <input type="number" id="boxCount" value="5" min="0" max="50" class="setting-input">
                </div>
                <div class="setting-group">
                    <label for="enableAliens">ALIENS</label>
                    <input type="checkbox" id="enableAliens" class="setting-checkbox" checked>
                </div>
                <div class="setting-group">
                    <label for="oxygenDepletion">O2 DEPLETE</label>
                    <input type="checkbox" id="oxygenDepletion" class="setting-checkbox" checked>
                </div>
                <div class="setting-group">
                    <label for="darkRoom">DARK</label>
                    <input type="checkbox" id="darkRoom" class="setting-checkbox">
                </div>
            </div>

            <div style="display:flex;gap:12px;justify-content:center;width:100%;flex-wrap:wrap;">
                <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
                    <label for="playerName" style="font-size:10px;color:var(--dim-color);letter-spacing:2px;">YOUR
                        NAME</label>
                    <input type="text" id="playerName" placeholder="enter name..." maxlength="20"
                        style="width:160px;text-align:center;" oninput="localStorage.setItem('playerName', this.value)">
                </div>
                <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
                    <label for="playerEmail" style="font-size:10px;color:var(--dim-color);letter-spacing:2px;">EMAIL
                        (not shared)</label>
                    <input type="email" id="playerEmail" placeholder="your@email.com"
                        style="width:160px;text-align:center;"
                        oninput="localStorage.setItem('playerEmail', this.value)">
                </div>
            </div>

            <div style="display:flex;flex-direction:column;gap:10px;width:100%;align-items:center;">
                <div style="color:var(--dim-color);font-size:12px;letter-spacing:2px;margin-bottom:5px;">SELECT GAME
                    MODE</div>
                <button class="btn" id="btn-enclose" onclick="startNewGame('SURVIVAL')">> ENCLOSE</button>
                <button class="btn" onclick="startNewGame('CAPTURE_FLAG')">> CAPTURE THE FLAG</button>
                <button class="btn" onclick="startRace()">> SYMBOL RACE</button>
            </div>

            <div id="leaderboard-section"
                style="width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--border-color);border-radius:8px;padding:15px;box-sizing:border-box;">
                <div style="font-size:10px;color:var(--dim-color);letter-spacing:2px;margin-bottom:12px;">SYMBOL RACE —
                    TOP TIMES</div>
                <div id="leaderboard-list" style="font-size:13px;color:var(--dim-color);">loading...</div>
            </div>
        </div>

        <div class="footer">
            [ SYSTEM READY ]<span class="blink">_</span>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.has('room')) {
            window.location.href = 'game.html' + window.location.search;
        }

        function startNewGame(mode) {
            const randomId = 'room_' + Math.random().toString(36).substr(2, 6);
            const settings = {
                enemyCount: parseInt(document.getElementById('enemyCount').value),
                dropletCount: parseInt(document.getElementById('dropletCount').value),
                boxCount: parseInt(document.getElementById('boxCount').value),
                darkRoom: document.getElementById('darkRoom').checked,
                enableAliens: document.getElementById('enableAliens').checked,
                oxygenDepletion: document.getElementById('oxygenDepletion').checked,
                gameMode: mode || 'SURVIVAL'
            };
            sessionStorage.setItem('roomSettings', JSON.stringify(settings));
            window.location.href = `game.html?room=${randomId}`;
        }

        function startRace() {
            const nameEl = document.getElementById('playerName');
            const emailEl = document.getElementById('playerEmail');
            const playerName = nameEl.value.trim();
            const playerEmail = emailEl.value.trim();

            let valid = true;
            if (!playerName) { nameEl.style.borderColor = '#ff6666'; valid = false; } else { nameEl.style.borderColor = ''; }
            if (!playerEmail || !playerEmail.includes('@')) { emailEl.style.borderColor = '#ff6666'; valid = false; } else { emailEl.style.borderColor = ''; }
            if (!valid) return;

            const randomId = 'room_' + Math.random().toString(36).substr(2, 6);
            const settings = {
                enemyCount: 0,
                dropletCount: 3,
                boxCount: 3,
                darkRoom: false,
                enableAliens: false,
                oxygenDepletion: false,
                gameMode: 'RACE',
                playerName,
                playerEmail
            };
            sessionStorage.setItem('roomSettings', JSON.stringify(settings));
            window.location.href = `game.html?room=${randomId}`;
        }

        const aliensCheckbox = document.getElementById('enableAliens');
        const encloseButton = document.getElementById('btn-enclose');
        function updateEncloseButton() {
            const off = !aliensCheckbox.checked;
            encloseButton.disabled = off;
            encloseButton.style.opacity = off ? '0.3' : '1';
            encloseButton.style.cursor = off ? 'not-allowed' : 'pointer';
            encloseButton.title = off ? 'ENCLOSE requires aliens to be enabled' : '';
        }
        aliensCheckbox.addEventListener('change', updateEncloseButton);
        updateEncloseButton();

        const savedName = localStorage.getItem('playerName');
        if (savedName) document.getElementById('playerName').value = savedName;
        const savedEmail = localStorage.getItem('playerEmail');
        if (savedEmail) document.getElementById('playerEmail').value = savedEmail;

        async function loadLeaderboard() {
            const list = document.getElementById('leaderboard-list');
            const myEmail = localStorage.getItem('playerEmail') || '';
            try {
                const res = await fetch('/api/leaderboard');
                const data = await res.json();
                if (!data.length) {
                    list.textContent = 'no records yet';
                    return;
                }
                list.innerHTML = data.map((row, i) => {
                    const isMe = myEmail && row.player_email === myEmail;
                    const nameColor = i === 0 ? '#ffd700' : i === 1 ? '#c0c0c0' : i === 2 ? '#cd7f32' : 'inherit';
                    return `<div style="display:flex;justify-content:space-between;padding:4px 6px;border-bottom:1px solid rgba(255,255,255,0.05);${isMe ? 'background:rgba(79,195,255,0.08);border-radius:4px;' : ''}">
                        <span style="color:${nameColor}">
                            ${i + 1}. ${row.player_name}${isMe ? ' <span style="color:#4fc3ff;font-size:10px;">YOU</span>' : ''}
                        </span>
                        <span style="color:var(--accent-color);margin-left:8px;">${row.finish_time_seconds}s</span>
                    </div>`;
                }).join('');
            } catch (e) {
                list.textContent = 'unavailable';
            }
        }
        loadLeaderboard();
    </script>
</body>

</html>
